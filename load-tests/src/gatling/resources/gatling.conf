// Gatling configuration.
// See https://docs.gatling.io/reference/script/core/configuration/ for all options.
//
// The Gradle plugin handles most settings (like report output directory).
// This file only overrides charting thresholds for the HTML report.

gatling {
  charting {
    // These thresholds define the color bands in the response time
    // distribution chart in the HTML report:
    //   Green:  < lowerBound (under 1 second — great)
    //   Yellow: lowerBound to higherBound (1-5 seconds — acceptable)
    //   Red:    > higherBound (over 5 seconds — needs attention)
    indicators {
      lowerBound = 1000
      higherBound = 5000
    }
  }
}
